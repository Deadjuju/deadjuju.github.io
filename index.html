<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Julien Garcia — Identité &amp; credentials</title>
  <meta name="description" content="Diplômes, titres et certifications de Julien Garcia, séparés, filtrables par thème et vérifiables.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#121214;             /* graphite neutre (ni brun, ni bleu) */
      --surface:#1b1b1f;        /* plaque d'acier brossé */
      --ink:#efe9df;            /* ivoire chaud (lisibilité + chaleur) */
      --muted:#9a968d;          /* gris chaud (métadonnées) */
      --line:#2d2d33;
      --line-2:#3b3b43;
      --accent:#e0a94e;         /* or chaud : liens, filtres actifs, focus */
      --accent-bright:#f0bf6a;
      --gilt:#f2cd7e;           /* or vif : marqueur ✓ vérifiable */
      --radius:10px;
      --maxw:1080px;
      --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans:"IBM Plex Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --display:"Fraunces", Georgia, "Times New Roman", serif;
      /* foil holographique du nom — réf. feuille de sécurité d'un titre d'identité (commence/finit sur la même teinte = boucle propre) */
      --foil:linear-gradient(110deg,#f0d68a 0%, #f2a9b0 26%, #c9b3f0 50%, #9fe0d6 74%, #f0d68a 100%);
      /* or = vérifiable (inlay) */
      --gold:linear-gradient(110deg,#f4d588 0%,#dca64a 40%,#c2873a 66%,#f4d588 100%);
    }

    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);
      font-size:16px;line-height:1.55;min-height:100vh;position:relative
    }
    /* lumière chaude diffuse (sobre — plus de "lac de feu" brun) */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(52% 40% at 50% -6%, rgba(224,169,78,.10), transparent 70%),
        radial-gradient(60% 45% at 50% 118%, rgba(224,169,78,.05), transparent 62%);
    }
    header,main,footer{position:relative;z-index:1}

    @keyframes glint{ to{ background-position:200% 0 } }

    /* ---- bloc identité ---- */
    .holder{position:relative;max-width:var(--maxw);margin:0 auto;padding:66px 24px 40px}
    .holder-inner{position:relative;z-index:1}
    .rosette{position:absolute;top:-26px;right:-24px;width:420px;height:420px;max-width:62vw;z-index:0;opacity:.07;pointer-events:none;fill:none;stroke:var(--gilt);stroke-width:.55}
    .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin:0 0 22px}
    .name{
      font-family:var(--display);font-weight:700;font-optical-sizing:auto;
      font-size:clamp(40px,7vw,76px);line-height:1.0;letter-spacing:-.015em;margin:0;width:max-content;max-width:100%;
      background:var(--foil);background-size:200% 100%;
      -webkit-background-clip:text;background-clip:text;
      color:transparent;-webkit-text-fill-color:transparent;
    }
    @supports not ((-webkit-background-clip:text) or (background-clip:text)){
      .name{color:var(--gilt);-webkit-text-fill-color:var(--gilt)}
    }
    .role{font-family:var(--display);font-weight:500;font-style:italic;font-size:clamp(17px,2.5vw,22px);color:var(--ink);opacity:.92;margin:14px 0 0}
    .summary{font-family:var(--mono);font-size:13px;color:var(--muted);margin:16px 0 0}
    .summary b{color:var(--gilt);font-weight:500}
    .links{display:flex;gap:10px;flex-wrap:wrap;margin:28px 0 0}
    .link{font-family:var(--mono);font-size:13px;text-decoration:none;color:var(--ink);border:1px solid var(--line-2);padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.015)}
    .link:hover{border-color:var(--accent);color:var(--accent-bright)}

    /* ligne guilloché (motif de document sécurisé) */
    .guilloche{display:block;width:100%;height:22px;fill:none;stroke:var(--gilt)}
    .guilloche path{stroke-width:1}
    .guilloche path:first-child{opacity:.42}
    .guilloche path:last-child{opacity:.7}

    /* ---- mise en page ---- */
    .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
    .controls{padding-top:32px}
    .controls-label{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:0 0 14px}

    /* ---- filtres ---- */
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line);padding:7px 13px;border-radius:999px;cursor:pointer}
    .chip:hover{border-color:var(--line-2)}
    .chip[aria-pressed="true"]{background:var(--accent);color:#1a160e;border-color:var(--accent);font-weight:500}
    .status{font-family:var(--mono);font-size:13px;color:var(--muted);margin:24px 0 0;display:flex;gap:10px;flex-wrap:wrap;align-items:baseline}
    .status .q{color:var(--accent)}
    .reset{font-family:var(--mono);font-size:13px;background:none;border:none;color:var(--accent);cursor:pointer;text-decoration:underline;padding:0}

    /* ---- blocs (tiers) ---- */
    .tier{margin-top:38px}
    .tier-head{display:flex;align-items:baseline;gap:11px;margin:0 0 16px;padding-bottom:11px;border-bottom:1px solid var(--line)}
    .tier-label{font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink)}
    .tier-count{font-family:var(--mono);font-size:12px;color:var(--accent)}

    /* ---- cartes = plaques d'acier brossé ---- */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(286px,1fr));gap:16px;align-items:start}
    .card{
      position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);
      padding:22px 20px 18px;display:flex;flex-direction:column;gap:14px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.045), rgba(255,255,255,0) 42%),
        repeating-linear-gradient(112deg, rgba(255,255,255,.016) 0 1px, rgba(0,0,0,0) 1px 3px),
        var(--surface);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.45);
    }
    /* credential vérifiable = filet d'or (inlay) */
    .card.verified::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);background-size:200% 100%}
    .card-head{display:flex;flex-direction:column;gap:8px}
    .card-title{font-family:var(--display);font-weight:600;font-optical-sizing:auto;font-size:19px;line-height:1.22;margin:0;color:var(--ink)}
    .card-title a{color:inherit;text-decoration:none}
    .card-title a:hover{color:var(--gilt)}
    .card-title .arrow{font-size:.74em;color:var(--gilt)}
    .verified-badge{font-family:var(--mono);font-size:12px;color:var(--gilt)}
    .meta{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin:0}
    .taglist{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
    .tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:4px 9px;cursor:pointer}
    .tag:hover{border-color:var(--line-2);color:var(--ink)}
    .tag[aria-pressed="true"]{color:#1a160e;background:var(--accent);border-color:var(--accent)}

    /* ---- cours & modules : panneau compact ---- */
    .coursepanel{
      border:1px solid var(--line);border-radius:var(--radius);padding:22px 22px 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.045), rgba(255,255,255,0) 42%),
        repeating-linear-gradient(112deg, rgba(255,255,255,.016) 0 1px, rgba(0,0,0,0) 1px 3px),
        var(--surface);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.45);
    }
    .coursepanel .y{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.85;margin:16px 0 8px}
    .coursepanel .y:first-child{margin-top:0}
    .coursepanel ul{list-style:none;margin:0 0 2px;padding:0;columns:2;column-gap:28px}
    .coursepanel li{font-size:13px;color:var(--ink);opacity:.82;margin:0 0 7px;break-inside:avoid;line-height:1.4;padding-left:15px;position:relative}
    .coursepanel li::before{content:'·';position:absolute;left:3px;color:var(--accent);opacity:.7}
    @media (min-width:900px){ .coursepanel ul{columns:3} }

    /* ---- pied + messages ---- */
    .foot{max-width:var(--maxw);margin:0 auto;padding:46px 24px 60px;font-family:var(--mono);font-size:12px;color:var(--muted)}
    .empty{font-family:var(--mono);color:var(--muted);padding:30px 0}
    .notice{border:1px dashed var(--line-2);border-radius:var(--radius);padding:22px;color:var(--muted);font-size:14px;line-height:1.65;background:var(--surface)}
    .notice strong{color:var(--ink)}
    .notice p{margin:0 0 10px}
    .notice p:last-child{margin:0}
    .notice code{font-family:var(--mono);background:#0d0d0f;border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--ink)}

    /* ---- socle qualité ---- */
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

    @media (prefers-reduced-motion: no-preference){
      .name, .card.verified::before{animation:glint 14s linear infinite}
      .card.verified::before{animation-duration:12s}
      main{opacity:0;transform:translateY(6px);transition:opacity .5s ease, transform .5s ease}
      main.ready{opacity:1;transform:none}
      .card{transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease}
      .card:hover{transform:translateY(-3px);border-color:var(--line-2)}
      .card.verified:hover{box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 12px 40px rgba(224,169,78,.13), 0 0 0 1px rgba(242,205,126,.16)}
      .chip,.tag,.link{transition:background .15s ease, border-color .15s ease, color .15s ease}
    }

    @media (max-width:560px){
      .holder{padding:48px 20px 32px}
      .rosette{width:300px;height:300px;top:-10px;right:-40px;opacity:.05}
      .wrap,.foot{padding-left:20px;padding-right:20px}
      .coursepanel ul{columns:1}
    }
  </style>
</head>

  </header>

  <main>
    <section class="wrap controls" aria-label="Filtres">
      <p class="controls-label">Filtrer par thème</p>
      <div class="chips" id="chips" role="group" aria-label="Thèmes"></div>
      <p class="status" id="status" aria-live="polite"></p>
    </section>

    <div class="wrap" id="sections"></div>
  </main>

  <footer class="foot" id="foot"></footer>

  <script>
    /* OR  : afficher les entrées ayant AU MOINS UN des thèmes sélectionnés.
       AND : n'afficher que les entrées qui possèdent TOUS les thèmes sélectionnés. */
    const FILTER_MODE = 'OR';

    /* Ordre et libellés des blocs. Inverse le tableau pour faire passer
       les certifications avant les diplômes. */
    const SECTION_ORDER  = ['diplome', 'certification', 'cours'];
    const SECTION_LABELS = { diplome: 'Diplômes & titres', certification: 'Certifications', cours: 'Cours & modules' };

    const state = { data: null, active: new Set() };
    const $ = (id) => document.getElementById(id);

    function h(tag, attrs = {}, ...kids){
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)){
        if (v == null) continue;
        if (k === 'class') e.className = v;
        else if (k === 'text') e.textContent = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
        else e.setAttribute(k, v);
      }
      for (const kid of kids){ if (kid != null && kid !== false) e.append(kid); }
      return e;
    }

    const catOf = (c) => (c.categorie === 'diplome' ? 'diplome' : c.categorie === 'cours' ? 'cours' : 'certification');

    async function init(){
      try{
        const res = await fetch('data.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        state.data = await res.json();
      }catch(err){
        renderLoadError();
        return;
      }
      applyUrl();
      renderHeader();
      renderChips();
      renderList();
      requestAnimationFrame(() => document.querySelector('main').classList.add('ready'));
    }

    function allTags(){
      const set = new Set();
      (state.data.credentials || []).forEach(c => (c.tags || []).forEach(t => set.add(t)));
      return [...set].sort((a, b) => a.localeCompare(b, 'fr'));
    }

    function applyUrl(){
      const raw = new URLSearchParams(location.search).get('tags');
      if (!raw) return;
      const known = allTags();
      raw.split(',').map(s => s.trim()).filter(Boolean).forEach(w => {
        const hit = known.find(t => t.toLowerCase() === w.toLowerCase());
        if (hit) state.active.add(hit);
      });
    }

    function syncUrl(){
      const params = new URLSearchParams(location.search);
      if (state.active.size) params.set('tags', [...state.active].join(','));
      else params.delete('tags');
      const qs = params.toString();
      history.replaceState(null, '', qs ? ('?' + qs) : location.pathname);
    }

    function toggle(tag){
      state.active.has(tag) ? state.active.delete(tag) : state.active.add(tag);
      syncUrl(); renderChips(); renderList();
    }
    function clearAll(){ state.active.clear(); syncUrl(); renderChips(); renderList(); }

    function matches(c){
      if (state.active.size === 0) return true;
      const tags = c.tags || [];
      const sel = [...state.active];
      return FILTER_MODE === 'AND' ? sel.every(t => tags.includes(t)) : sel.some(t => tags.includes(t));
    }

    function renderHeader(){
      const p = state.data.profil || {};
      const all = state.data.credentials || [];
      const creds = all.filter(c => catOf(c) !== 'cours');
      const modules = all.filter(c => catOf(c) === 'cours');
      const verifiable = all.filter(c => c.lien).length;

      $('name').textContent = p.nom || '';
      $('role').textContent = p.titre || '';

      const sum = $('summary'); sum.replaceChildren();
      sum.append(document.createTextNode(creds.length + ' credentials · '));
      sum.append(h('b', { text: verifiable + ' vérifiable' + (verifiable > 1 ? 's' : '') }));
      if (modules.length) sum.append(document.createTextNode(' · ' + modules.length + ' modules'));

      const nav = $('links'); nav.replaceChildren();
      (p.liens || []).forEach(l => {
        if (!l || !l.url) return;
        nav.append(h('a', { class:'link', href:l.url, target:'_blank', rel:'noopener', text:l.label || l.url }));
      });

      const updated = new Date().toLocaleDateString('fr-FR', { year:'numeric', month:'long' });
      $('foot').textContent = (p.nom ? p.nom + ' · ' : '') + 'mis à jour ' + updated;
    }

    function renderChips(){
      const box = $('chips'); box.replaceChildren();
      box.append(h('button', {
        class:'chip', type:'button',
        'aria-pressed': state.active.size === 0 ? 'true' : 'false',
        onClick: clearAll, text:'Tout'
      }));
      allTags().forEach(t => box.append(h('button', {
        class:'chip', type:'button',
        'aria-pressed': state.active.has(t) ? 'true' : 'false',
        onClick: () => toggle(t), text:t
      })));
    }

    function renderStatus(shown, total){
      const s = $('status'); s.replaceChildren();
      if (state.active.size === 0) return;   // le compteur global est déjà dans le bloc identité
      const op = FILTER_MODE === 'AND' ? ' + ' : ' ou ';
      s.append(h('span', { text: shown + ' sur ' + total }));
      s.append(h('span', { class:'q', text: '· ' + [...state.active].join(op) }));
      s.append(h('button', { class:'reset', type:'button', onClick: clearAll, text:'tout afficher' }));
    }

    function renderList(){
      const host = $('sections'); host.replaceChildren();
      const all = state.data.credentials || [];
      const visible = all.filter(matches);
      const creds = all.filter(c => catOf(c) !== 'cours');
      renderStatus(creds.filter(matches).length, creds.length);

      if (visible.length === 0){
        host.append(h('p', { class:'empty', text:'Aucun élément pour ce filtre. Retire un thème pour élargir.' }));
        return;
      }

      SECTION_ORDER.forEach(key => {
        const items = visible.filter(c => catOf(c) === key);
        if (!items.length) return;
        const sec = h('section', { class:'tier', 'aria-label': SECTION_LABELS[key] || key });
        const head = h('div', { class:'tier-head' });
        head.append(h('span', { class:'tier-label', text: SECTION_LABELS[key] || key }));
        head.append(h('span', { class:'tier-count', text: String(items.length) }));
        sec.append(head);
        if (key === 'cours'){
          sec.append(renderCoursePanel(items));
        } else {
          const grid = h('div', { class:'grid' });
          items.forEach(c => grid.append(renderCard(c)));
          sec.append(grid);
        }
        host.append(sec);
      });
    }

    function renderCoursePanel(items){
      const panel = h('div', { class:'coursepanel' });
      const byYear = {};
      items.forEach(m => { (byYear[m.date || '—'] ||= []).push(m.titre); });
      Object.keys(byYear).sort().forEach(year => {
        panel.append(h('p', { class:'y', text: year }));
        const ul = h('ul');
        byYear[year].forEach(t => ul.append(h('li', { text: t })));
        panel.append(ul);
      });
      return panel;
    }

    function renderCard(c){
      const head = h('div', { class:'card-head' });

      const title = h('h2', { class:'card-title' });
      if (c.lien){
        const a = h('a', { href:c.lien, target:'_blank', rel:'noopener' });
        a.append(document.createTextNode((c.titre || '') + ' '));
        a.append(h('span', { class:'arrow', 'aria-hidden':'true', text:'↗' }));
        title.append(a);
      } else {
        title.textContent = c.titre || '';
      }
      head.append(title);
      if (c.lien) head.append(h('span', { class:'verified-badge', text:'✓ vérifiable' }));

      const metaBits = [c.emetteur, c.date].filter(Boolean);
      if (metaBits.length) head.append(h('p', { class:'meta', text: metaBits.join(' · ') }));

      const card = h('div', { class: c.lien ? 'card verified' : 'card' }, head);

      const tags = c.tags || [];
      if (tags.length){
        const tl = h('div', { class:'taglist' });
        tags.forEach(t => tl.append(h('button', {
          class:'tag', type:'button',
          'aria-pressed': state.active.has(t) ? 'true' : 'false',
          onClick: () => toggle(t), text:t
        })));
        card.append(tl);
      }

      return card;
    }

    function renderLoadError(){
      $('sections').replaceChildren(
        h('div', { class:'notice' },
          h('p', { html: '<strong>data.json n\'a pas pu être chargé.</strong>' }),
          h('p', { text: "C'est normal si tu as ouvert la page en double-cliquant (adresse en file://) : par sécurité, le navigateur bloque la lecture du JSON depuis le disque. Deux options :" }),
          h('p', { html: '1 — Lance un petit serveur local depuis le dossier : <code>python3 -m http.server</code>, puis ouvre <code>http://localhost:8000</code>.' }),
          h('p', { text: '2 — Mets le dossier en ligne sur GitHub Pages : là, tout fonctionne sans rien lancer.' })
        )
      );
      document.querySelector('main').classList.add('ready');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
